steps:
  - name: 'google/cloud-sdk:latest'
    id: 'Deploy'
    entrypoint: 'sh'
    secretEnv: ['DEPLOY_SSH_KEY']
    args:
      - '-c'
      - |
        set -e
        mkdir -p /root/.ssh && chmod 700 /root/.ssh
        echo "$$DEPLOY_SSH_KEY" > /root/.ssh/id_rsa
        chmod 600 /root/.ssh/id_rsa
        ssh-keygen -y -f /root/.ssh/id_rsa > /root/.ssh/id_rsa.pub 2>/dev/null

        VM="$_VM_NAME"
        ZONE="$_VM_ZONE"
        STATUS=$(gcloud compute instances describe "$$VM" --zone="$$ZONE" \
          --format="value(status)" 2>/dev/null || echo "NOT_FOUND")

        if [ "$$STATUS" != "RUNNING" ]; then
          if [ "$_ALLOW_SKIP" = "true" ]; then
            echo "⚠️  $$VM is $$STATUS — skipping"
            exit 0
          else
            echo "❌  $$VM is $$STATUS — aborting"
            exit 1
          fi
        fi

        echo "🚀 Deploying to $$VM"
        gcloud compute ssh deploy@"$$VM" \
          --zone="$$ZONE" \
          --ssh-key-file=/root/.ssh/id_rsa \
          --tunnel-through-iap \
          --command="sudo -u frappe bash -c 'cd /home/frappe/frappe-bench && \
            git -C apps/erpnext_enhancements pull --ff-only upstream main && \
            bench --site all migrate && \
            bench build' && \
            sudo systemctl restart frappe-bench"
        echo "✅  $$VM updated"

timeout: '600s'
options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _ALLOW_SKIP: 'false'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DEPLOY_SSH_KEY/versions/latest
      env: 'DEPLOY_SSH_KEY'
