${spot_vm_name}:
  zone: ${region}-b
  machine_type: ${spot_machine_type}
  network_interfaces:
    - network: ${network}
      subnetwork: ${subnetwork}
      nat: "${enable_spot_public_ip ? \"true\" : \"null\"}"
      addresses: null
  boot_disk:
    initialize_params:
      image: "projects/debian-cloud/global/images/family/debian-12"
      size: 50
      type: "pd-ssd"
  attached_disks: {}
  service_account:
    auto_create: true
  metadata: {}
  labels:
    role: "batch-processor"
  termination_action: "DELETE"
