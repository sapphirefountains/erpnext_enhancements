${spot_vm_name}:
  zone: ${vm_zone}
  machine_type: ${spot_machine_type}
  network_interfaces:
    - network: ${network}
      subnetwork: ${subnetwork}
      nat: "${nat_ip_resolved}"
      addresses: null
  boot_disk:
    auto_delete: ${boot_disk_auto_delete}
    #%{ if boot_disk_source_attach != "" }
    source:
      attach: ${boot_disk_source_attach}
    initialize_params: null
    #%{ else }
    #%{ if reuse_existing_disks }
    use_independent_disk: {}
    #%{ endif }
    initialize_params:
      image: ${vm_boot_disk_image}
      size: ${vm_boot_disk_size}
      type: "${boot_disk_type}"
    #%{ endif }
    #%{ if enable_spot_vm_snapshot_schedule }
    snapshot_schedule:
      - daily-snapshots
    #%{ endif }
  
  # 🎯 THE FIX: Pass a pre-encoded JSON string array here to avoid YAML syntax clashing
  attached_disks: ${attached_disks_json}
  tags: ${vm_network_tags}
  service_account:
    auto_create: true
#%{ if enable_startup_script }
  metadata:
    startup-script: |
${startup_script}
#%{ endif }
  labels: ${spot_vm_labels_json}
  termination_action: "DELETE"
  #%{ if enable_spot_vm_snapshot_schedule }
  snapshot_schedules:
    daily-snapshots:
      schedule:
        daily:
          days_in_cycle: 1
          start_time: "${snapshot_schedule_start_time}"
      retention_policy:
        max_retention_days: ${snapshot_schedule_retention_days}
      snapshot_properties:
        storage_locations:
          - "${snapshot_schedule_storage_location}"
  #%{ endif }