${standard_vm_name}:
  zone: ${region}-a
  machine_type: ${compute_machine_type}
  network_interfaces:
    - network: ${network}
      subnetwork: ${subnetwork}
      nat: "${nat_ip_resolved}"
      addresses: null
  boot_disk:
    initialize_params:
      image: "projects/debian-cloud/global/images/family/debian-12"
      size: 30
      type: "pd-balanced"

  # 🎯 FIXED: Uses pre-encoded string array to dynamic mount points safely
  attached_disks: ${attached_disks_json}

  service_account:
    auto_create: true
  metadata:
    startup-script: |
      #!/bin/bash
      apt-get update
      apt-get install -y nginx
  labels:
    role: "web-frontend"