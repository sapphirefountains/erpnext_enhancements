${standard_vm_name}:
  zone: ${vm_zone}
  machine_type: ${compute_machine_type}
  network_interfaces:
    - network: ${network}
      subnetwork: ${subnetwork}
      nat: "${nat_ip_resolved}"
      addresses: null
  boot_disk:
    auto_delete: ${boot_disk_auto_delete}
    #%{ if boot_disk_source_attach != "" }
    source:
      attach: ${boot_disk_source_attach}
    initialize_params: null
    #%{ else }
    #%{ if reuse_existing_disks }
    use_independent_disk: {}
    #%{ endif }
    initialize_params:
      image: ${vm_boot_disk_image}
      size: ${vm_boot_disk_size}
      type: "${boot_disk_type}"
    #%{ endif }

  # 🎯 FIXED: Uses pre-encoded string array to dynamic mount points safely
  attached_disks: ${attached_disks_json}
  tags: ${vm_network_tags}
  service_account:
    auto_create: true
#%{ if enable_startup_script }
  metadata:
    startup-script: |
${startup_script}
#%{ endif }
  labels: ${vm_labels_json}