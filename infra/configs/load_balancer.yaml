app-glb:
  protocol: "HTTPS"
  use_classic_version: false
  urlmap_config:
    description: "Application Gateway routing rules"
    default_service: "${default_service}"
  
  # ============================================================================
  # 1. Network Endpoint Groups (NEGs) - Only for Serverless Cloud Run
  # ============================================================================
  neg_configs:
    # Handle Cloud Run exclusively; VMs do not use module-managed NEGs
    #%{ if provision_cloud_run }
    frontend-neg:
      cloudrun:
        region: ${region}
        target_service:
          name: "frontend-service"
    #%{ endif }

  # ============================================================================
  # 2. Backend Service Route Assignments
  # ============================================================================
  backend_service_configs:
    # Standalone Production VM Routing Entry Block
    #%{ if provision_compute_vm }
    production-vm-backend:
      backends:
        - backend: "${standalone_vm_neg_name}" # Passes the UMIG/NEG self-link directly
      health_checks: ["$$mig_health_check_id"]
      port_name: "http"
    #%{ endif }

    # Staging Spot VM Routing Entry Block
    #%{ if provision_spot_vm }
    spot_vm_backend:
      backends:
        - backend: "${spot_vm_neg_name}" # Passes the UMIG/NEG self-link directly
      health_checks: ["$$mig_health_check_id"]
      port_name: "http"
    #%{ endif }

    # Cloud Run Routing Entry Block
    #%{ if provision_cloud_run }
    frontend-neg:
      backends:
        - backend: "frontend-neg"
      health_checks: []
      port_name: ""
    #%{ endif }

    # Legacy MIG Entry Blocks (Kept for backwards compatibility fallback)
    #%{ if provision_prod_mig }
    prod-mig-backend:
      backends:
        - backend: "$$prod_mig_group"
          balancing_mode: "UTILIZATION"
      health_checks: ["$$mig_health_check_id"]
      port_name: "http"
    #%{ endif }
    #%{ if provision_test_mig }
    test-mig-backend:
      backends:
        - backend: "$$test_mig_group"
          balancing_mode: "UTILIZATION"
      health_checks: ["$$mig_health_check_id"]
      port_name: "http"
    #%{ endif }

  # ============================================================================
  # 3. Global Edge Network Infrastructure Blocks
  # ============================================================================
  backend_buckets_config: {}
  forwarding_rules_config:
    https-rule:
      address: "$$addresses:global:${glb_ip_name}"
  ssl_certificates:
    certificate_map: "$$ssl_certificates:${ssl_map_name}"
  health_check_configs: {}