steps:

  # ============================================================================
  # DEBUG STEP: FIND THE RIGHT DIRECTORY
  # ============================================================================
  - name: 'ubuntu'
    id: 'Workspace Directory Mapping Debug'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "=== CURRENT DIRECTORY ==="
        pwd
        echo "=== LIST ROOT CONTENTS ==="
        ls -la
        echo "=== SEARCH FOR INFRA PATHS ==="
        find . -type d -name "infra"
  # ============================================================================
  # STEP 1: INITIALIZE TERRAFORM WITH REMOTE STATE
  # ============================================================================
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Init'
    dir: 'erpnext_enhancements/infra'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "Configuring remote GCS backend utilizing bucket: $_STATE_BUCKET"
        terraform init \
          -backend-config="bucket=$_STATE_BUCKET" \
          -backend-config="prefix=terraform/state"

  # ============================================================================
  # STEP 2: RUN THE CONDITIONAL EXECUTION (APPLY OR DESTROY)
  # ============================================================================
  - name: 'hashicorp/terraform:1.5.7'
    id: 'Terraform Execution'
    dir: 'erpnext_enhancements/infra'
    entrypoint: 'sh'
    # 🎯 THE CRITICAL FIX: Explicitly links the global secret container to this runtime container step
    secretEnv: ['SECRET_TFVARS']
    args:
      - '-c'
      - |
        # 🎯 THE EXTRA PASS: Writes the secure string dynamically out to your TF folder environment
        echo "$$SECRET_TFVARS" > terraform.tfvars

        # Check if this invocation was triggered by the designated trigger action
        if [ "$_ACTION" = "destroy" ]; then
          echo "⚠️ Deletion action detected. Initiating teardown protocols..."
          terraform destroy -auto-approve
        elif [ "$_ACTION" = "refresh" ]; then
          echo "🔄 Refresh-only action detected. Reconciling state file..."
          terraform apply -refresh-only -auto-approve
        else
          echo "🚀 Deployment action detected. Initiating mutation passes..."
          terraform apply -auto-approve
        fi

# ============================================================================
# SECRET MANAGER MAPPING DEFINITIONS
# ============================================================================
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SECRET_TFVARS/versions/latest
      env: 'SECRET_TFVARS'

# ============================================================================
# TIMEOUT AND LOGGING CONTROLS
# ============================================================================
timeout: '1800s' # 30-minute absolute execution safety threshold
options:
  logging: CLOUD_LOGGING_ONLY
