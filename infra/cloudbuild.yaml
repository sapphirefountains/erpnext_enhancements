steps:

  # ============================================================================
  # STEP 0: FIX REPOSITORY PATH SYMLINKS FOR RUNNER CONTAINER
  # ============================================================================
  - name: 'ubuntu'
    id: 'Fix Module Path Contexts'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "Validating current repository layout context..."
        ls -la
        
        # Ensures a clean framework pointer folder maps out if directory blocks are displaced
        if [ -d "modules" ] && [ ! -d "infra/modules" ]; then
          echo "Linking modules directory context..."
          ln -sf /workspace/modules /workspace/infra/modules
        fi

  # ============================================================================
  # STEP 1: INITIALIZE TERRAFORM WITH REMOTE STATE
  # ============================================================================
  - name: 'hashicorp/terraform:1.13.0'
    id: 'Terraform Init'
    dir: 'infra'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "Configuring remote GCS backend for $_DEPLOYMENT_MODE state"
        terraform init \
          -backend-config="bucket=$_STATE_BUCKET" \
          -backend-config="prefix=terraform/$_DEPLOYMENT_MODE" \
          -reconfigure

  # ============================================================================
  # STEP 2: RUN THE CONDITIONAL EXECUTION (APPLY OR DESTROY)
  # ============================================================================
  - name: 'hashicorp/terraform:1.13.0'
    id: 'Terraform Execution'
    dir: 'infra'
    entrypoint: 'sh'
    secretEnv: ['SECRET_TFVARS']
    args:
      - '-c'
      - |
        # For shared state, use the secret-stored tfvars (contains GitHub token etc.)
        # For test/prod, the in-repo tfvars file is used directly (no secrets)
        if [ "$_DEPLOYMENT_MODE" = "shared" ]; then
          echo "Using secret-stored tfvars for shared state"
          echo "$$SECRET_TFVARS" > $_DEPLOYMENT_MODE.tfvars
        else
          echo "Using in-repo $_DEPLOYMENT_MODE.tfvars"
        fi

        if [ "$_ACTION" = "destroy" ]; then
          echo "Deletion action detected. Initiating teardown protocols..."
          terraform destroy -var-file=$_DEPLOYMENT_MODE.tfvars -auto-approve
        elif [ "$_ACTION" = "refresh" ]; then
          echo "Refresh-only action detected. Reconciling state file..."
          terraform apply -var-file=$_DEPLOYMENT_MODE.tfvars -refresh-only -auto-approve
        else
          echo "Deployment action detected. Initiating mutation passes..."
          terraform apply -var-file=$_DEPLOYMENT_MODE.tfvars -auto-approve
        fi

# ============================================================================
# SECRET MANAGER MAPPING DEFINITIONS
# ============================================================================
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SECRET_TFVARS/versions/latest
      env: 'SECRET_TFVARS'

# ============================================================================
# TIMEOUT AND LOGGING CONTROLS
# ============================================================================
timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY
