<div class="kpi-root">

            <h4 class="kpi-title">KPI Dashboard</h4>
            <span class="kpi-meta" id="kpi-meta"></span>
        </div>
        <div class="kpi-controls">
            <select class="kpi-dept" id="kpi-dept" title="Department"></select>

        </div>

        <div class="kpi-loading">Loading&hellip;</div>
    </div>
</div>
