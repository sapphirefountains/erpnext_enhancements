<!--
  Projects Dashboard — markup for the "Projects Dashboard" Custom HTML Block.

  This is the exported source of a Frappe "Custom HTML Block": a dashboard widget
  whose HTML / CSS / JS are authored and stored in the Frappe UI (Custom HTML Block
  doctype) and embedded on a Workspace/dashboard. The three projects_dashboard.*
  files in this directory are a checked-in copy kept as the source of truth / backup
  — edit them here and paste back into the Custom HTML Block in the UI to deploy.

  This file is the static shell: a tabbed container (Priority Overview, Active
  Internal Projects, Completed Projects, Portfolio Gantt, Dashboard), a search box,
  "New Project" / "New Master Project" quick-create buttons, the Gantt-only filter
  controls (project / status dropdowns, "Show Tasks", view-mode buttons, Today), and
  an empty #dashboard-content target. projects_dashboard.js
  fetches data via the project_dashboard page's whitelisted methods and renders the
  tables / Gantt into #dashboard-content; projects_dashboard.css styles it.
-->
<div class="project-dashboard-container">
    <div class="dashboard-tabs p-3 pb-0 border-bottom">
        <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" href="javascript:void(0)" data-route="priority-overview">Priority Overview</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="javascript:void(0)" data-route="active-internal-projects">Active Internal Projects</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="javascript:void(0)" data-route="completed-projects">Completed Projects</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="javascript:void(0)" data-route="portfolio-gantt">Portfolio Gantt</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="javascript:void(0)" data-route="dashboard">Dashboard</a>
            </li>
        </ul>
    </div>

    <div class="dashboard-controls p-2 border-bottom" style="background: var(--subtle-fg);">
        <div class="row align-items-center m-0">
            
            <div class="col-12 col-md-4 p-0 mb-2 mb-md-0" id="standard-controls">
                <div class="input-group input-group-sm" style="max-width: 300px;">
                    <div class="input-group-prepend">
                        <span class="input-group-text"><i class="fa fa-search"></i></span>
                    </div>
                    <input type="text" class="form-control" id="global-project-search" placeholder="Search projects...">
                </div>
            </div>

            <div class="col-12 col-md-8 p-0 mb-2 mb-md-0 text-md-right" id="dashboard-actions">
                <button type="button" class="btn btn-sm btn-primary" id="btn-new-project"><i class="fa fa-plus mr-1"></i>New Project</button>
                <button type="button" class="btn btn-sm btn-default border ml-2" id="btn-new-master-project"><i class="fa fa-plus mr-1"></i>New Master Project</button>
            </div>

            <div class="col-12 p-0" id="gantt-controls" style="display: none;">

                <!-- Row 1 — what is shown -->
                <div class="pg-toolbar">
                    <div class="pg-toolbar-group pg-toolbar-search">
                        <div class="input-group input-group-sm">
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="fa fa-search"></i></span>
                            </div>
                            <input type="text" class="form-control" id="gantt-search" placeholder="Find a project...">
                            <div class="input-group-append">
                                <button class="btn btn-default border" type="button" id="gantt-search-clear" title="Clear search">&times;</button>
                            </div>
                        </div>
                    </div>

                    <div class="dropdown check-dropdown">
                        <button class="btn btn-sm btn-default border custom-dropdown-toggle" type="button" id="ganttProjectDropdown">All Projects</button>
                        <div class="dropdown-menu p-2 shadow-sm" id="gantt-project-menu">
                            <input type="text" class="form-control form-control-sm mb-2" id="gantt-project-search" placeholder="Search projects...">
                            <label class="pg-check font-weight-bold border-bottom pb-2 mb-2">
                                <input type="checkbox" id="gantt-select-all-projects" checked>
                                <span>Select All</span>
                            </label>
                            <div id="gantt-project-checkboxes"></div>
                            <div class="dropdown-divider"></div>
                            <button class="btn btn-sm btn-primary w-100" id="apply-gantt-project-filters">Apply</button>
                        </div>
                    </div>

                    <div class="dropdown check-dropdown">
                        <button class="btn btn-sm btn-default border custom-dropdown-toggle" type="button" id="ganttStatusDropdown">All Statuses</button>
                        <div class="dropdown-menu p-2 shadow-sm" id="gantt-status-menu">
                            <div id="gantt-status-checkboxes"></div>
                            <div class="dropdown-divider"></div>
                            <button class="btn btn-sm btn-primary w-100" id="apply-gantt-status-filters">Apply</button>
                        </div>
                    </div>

                    <div class="dropdown check-dropdown">
                        <button class="btn btn-sm btn-default border custom-dropdown-toggle" type="button" id="ganttTypeDropdown">All Types</button>
                        <div class="dropdown-menu p-2 shadow-sm" id="gantt-type-menu">
                            <div id="gantt-type-checkboxes"></div>
                            <div class="dropdown-divider"></div>
                            <button class="btn btn-sm btn-primary w-100" id="apply-gantt-type-filters">Apply</button>
                        </div>
                    </div>

                    <div class="dropdown check-dropdown">
                        <button class="btn btn-sm btn-default border custom-dropdown-toggle" type="button" id="ganttCustomerDropdown">All Customers</button>
                        <div class="dropdown-menu p-2 shadow-sm pg-menu-scroll" id="gantt-customer-menu">
                            <input type="text" class="form-control form-control-sm mb-2" id="gantt-customer-search" placeholder="Search customers...">
                            <div id="gantt-customer-checkboxes"></div>
                            <div class="dropdown-divider"></div>
                            <button class="btn btn-sm btn-primary w-100" id="apply-gantt-customer-filters">Apply</button>
                        </div>
                    </div>

                    <select id="gantt-date-window" class="form-control form-control-sm pg-date-window" title="Show only projects overlapping this window">
                        <option value="">Any dates</option>
                        <option value="30">Next 30 days</option>
                        <option value="90">Next 90 days</option>
                        <option value="180">Next 6 months</option>
                        <option value="365">Next 12 months</option>
                    </select>

                    <label class="pg-check pg-inline-check mb-0" title="Past its expected end date and not yet complete">
                        <input type="checkbox" id="gantt-at-risk">
                        <span>At risk only</span>
                    </label>
                </div>

                <!-- Row 2 — how it is shown -->
                <div class="pg-toolbar pg-toolbar-view">
                    <div class="btn-group btn-group-sm view-mode-group" role="group">
                        <button type="button" class="btn btn-outline-secondary" data-view="Quarter Day">Qtr Day</button>
                        <button type="button" class="btn btn-outline-secondary" data-view="Half Day">Half Day</button>
                        <button type="button" class="btn btn-outline-secondary" data-view="Day">Day</button>
                        <button type="button" class="btn btn-secondary active" data-view="Week">Week</button>
                        <button type="button" class="btn btn-outline-secondary" data-view="Month">Month</button>
                    </div>

                    <button type="button" class="btn btn-sm btn-outline-primary" id="gantt-today-btn">Today</button>

                    <div class="dropdown check-dropdown">
                        <button class="btn btn-sm btn-default border custom-dropdown-toggle" type="button" id="ganttColumnsDropdown">Columns</button>
                        <div class="dropdown-menu p-2 shadow-sm" id="gantt-columns-menu">
                            <div id="gantt-column-checkboxes"></div>
                        </div>
                    </div>

                    <button type="button" class="btn btn-sm btn-link text-muted" id="gantt-reset-view" title="Clear saved filters, columns, zoom and expanded projects">Reset view</button>

                    <!-- colour key; populated by render_gantt_legend() -->
                    <div class="pg-legend" id="gantt-legend"></div>
                </div>
            </div>

        </div>
    </div>

    <div class="dashboard-content p-3" id="dashboard-content">
    </div>
</div>
