name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint — advisory for now.
  #
  # The codebase carries a pre-existing ruff backlog (mostly whitespace / import
  # ordering that `ruff format` owns via pre-commit). This job surfaces lint
  # findings on every PR without blocking merges. Once a dedicated lint-cleanup
  # PR has run `ruff check --fix` + `ruff format`, drop `continue-on-error` to
  # make it a hard gate.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.8.1
      - name: ruff check
        continue-on-error: true
        run: ruff check erpnext_enhancements/ --output-format=github

  # ---------------------------------------------------------------------------
  # Standalone unit tests — no Frappe/bench required, so they run fast on every
  # push. Covers the time-kiosk consolidation algorithm, plus the bench-free
  # suites that guard the security-sensitive AI write gate
  # (assistant_tools/_gate.py), the FAC assistant-tool contract, and the
  # Integrations Health tone helpers. The latter three import their tool
  # modules under the sys.modules stubs installed by test_assistant_tools_schema
  # (no live frappe / FAC), so they run here as plain unittest. A final check
  # (test_doctype_modules) asserts every custom DocType sits in its declared
  # module — pure filesystem, no stubs.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Standalone unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip httpx
      - run: python -m unittest test_sync_time_kiosk.py -v
      - name: AI gate + assistant-tool contract + integrations health + device mgmt
        run: >-
          python -m unittest
          erpnext_enhancements.tests.test_assistant_tools_schema
          erpnext_enhancements.tests.test_ai_gate_unit
          erpnext_enhancements.tests.test_integrations_health
          erpnext_enhancements.tests.test_device_management
          erpnext_enhancements.tests.test_mdm_integration
          erpnext_enhancements.tests.test_drive_match -v
      - name: DocType module placement
        run: python -m unittest erpnext_enhancements.tests.test_doctype_modules -v

  # ---------------------------------------------------------------------------
  # Version sync — hard gate.
  #
  # release.yml refuses to tag when __init__.py and package.json disagree
  # ("bump both together"), but it only runs after a merge to main — by then
  # the drift has already silently blocked the release (this bit v0.9.0: only
  # __init__.py was bumped, the Release run failed post-merge, and no tag was
  # cut until a follow-up PR). This job runs the same comparison on every
  # push/PR so a half-finished bump fails *before* merge, where it's cheap.
  # ---------------------------------------------------------------------------
  version-sync:
    name: Version sync (__init__.py == package.json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions
        run: |
          PY=$(sed -n 's/^__version__ *= *"\([^"]*\)".*/\1/p' erpnext_enhancements/__init__.py)
          PKG=$(sed -n 's/.*"version" *: *"\([^"]*\)".*/\1/p' package.json | head -1)
          echo "__init__.py: $PY"
          echo "package.json: $PKG"
          if [ -z "$PY" ] || [ "$PKG" != "$PY" ]; then
            echo "::error::Version drift -- __init__.py is '$PY' but package.json is '$PKG'. Bump both together (release.yml will refuse to tag otherwise)."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # NOTE: A Frappe integration-test job (spinning up a real bench with ERPNext
  # + payments and running `bench run-tests --app erpnext_enhancements`) was
  # removed. On the version-16 toolchain it never reached our own assertions —
  # it kept aborting in Frappe's test-record auto-generation, which walks the
  # entire ERPNext doctype dependency graph and tripped over environment gaps
  # one after another (missing utils, uninstalled companion doctypes like
  # "Payment Gateway", etc.). Each fix only surfaced the next, so the job gated
  # PRs on upstream/environment churn unrelated to this app's code. We rely on
  # the standalone `unit-tests` job above instead. The Frappe-dependent test
  # files under erpnext_enhancements/ remain in the tree and can still be run
  # against a real bench locally (`bench --site <site> run-tests --app
  # erpnext_enhancements`); reintroduce a CI job here once the upstream test
  # harness stabilises.
  # ---------------------------------------------------------------------------
