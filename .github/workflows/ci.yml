name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint — advisory for now.
  #
  # The codebase carries a pre-existing ruff backlog (mostly whitespace / import
  # ordering that `ruff format` owns via pre-commit). This job surfaces lint
  # findings on every PR without blocking merges. Once a dedicated lint-cleanup
  # PR has run `ruff check --fix` + `ruff format`, drop `continue-on-error` to
  # make it a hard gate.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.8.1
      - name: ruff check
        continue-on-error: true
        run: ruff check erpnext_enhancements/ --output-format=github

  # ---------------------------------------------------------------------------
  # Standalone unit tests — no Frappe/bench required, so they run fast on every
  # push. Covers the time-kiosk consolidation algorithm in isolation.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Standalone unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip httpx
      - run: python -m unittest test_sync_time_kiosk.py -v

  # ---------------------------------------------------------------------------
  # Integration tests — spins up a real Frappe site with ERPNext installed and
  # runs the app's actual test suite (erpnext_enhancements/tests/*). This is what
  # exercises the production code paths; the old CI only ran the standalone copy.
  #
  # NOTE: FRAPPE_BRANCH must match the major version this app targets
  # (pyproject.toml pins frappe >=16,<17). Adjust if the deployed version differs.
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Frappe integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FRAPPE_BRANCH: version-16
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        # `mysqladmin ping` is credential-agnostic: it reports success as soon as
        # the server responds, even when auth is denied. The previous
        # `healthcheck.sh --connect` connected as root with no password, which
        # MARIADB_ROOT_PASSWORD makes invalid — so the check never passed and the
        # container was killed as unhealthy before any test ran. This matches the
        # healthcheck used by upstream Frappe/ERPNext CI.
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

      # Installing ERPNext enqueues background jobs (e.g. delete_dynamic_links
      # via enqueue_after_commit) during `bench new-site`, which forces a
      # connection to Redis Queue. `bench init --skip-redis-config-generation`
      # writes no redis config and never starts redis, so Frappe falls back to
      # its default 127.0.0.1:11000 and the connection is refused. Run a real
      # redis as a service container and point all three Frappe redis URLs at
      # it (see the "Create test site" step). One instance is fine for CI:
      # there's no worker consuming the queue, the enqueue only needs the
      # connection to succeed.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: apps/erpnext_enhancements

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Must track Frappe's minimum: version-16 (>=16.20.0) requires
          # Python >=3.14,<3.15, and `uv` refuses to install it into an older
          # venv. Bump this in lockstep with FRAPPE_BRANCH's Python floor.
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Must track Frappe's minimum: version-16's package.json sets
          # engines.node ">=24", and `yarn install` aborts during `bench init`
          # if the running Node is older. Bump in lockstep with FRAPPE_BRANCH.
          node-version: "24"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # redis runs as a service container (see services.redis); installing
          # the apt redis-server here would try to bind host port 6379 and
          # collide with the container's port mapping.
          sudo apt-get install -y libmysqlclient-dev
          npm install -g yarn

      - name: Install bench
        run: pip install frappe-bench

      - name: Initialise bench and fetch apps
        run: |
          bench init --skip-redis-config-generation \
            --frappe-branch "$FRAPPE_BRANCH" \
            --python "$(which python)" \
            frappe-bench
          cd frappe-bench
          bench get-app erpnext --branch "$FRAPPE_BRANCH" --resolve-deps
          # ERPNext ships doctypes that Link to "Payment Gateway" (e.g. Payment
          # Gateway Account), but that doctype now lives in the separate
          # `payments` app and is NOT in ERPNext's required_apps, so
          # `--resolve-deps` above doesn't fetch it. Without it, Frappe's
          # test-record dependency walker hits "DocType Payment Gateway not
          # found" and aborts `run-tests`. Fetch payments on the matching branch.
          bench get-app payments --branch "$FRAPPE_BRANCH"
          bench get-app erpnext_enhancements "${GITHUB_WORKSPACE}/apps/erpnext_enhancements"

      - name: Create test site
        working-directory: frappe-bench
        run: |
          bench set-config -g db_host 127.0.0.1
          bench set-config -g db_port 3306
          # Override Frappe's default redis ports (cache 13000 / queue 11000 /
          # socketio 12000) — none of those are running — with the single redis
          # service container on 6379.
          bench set-config -g redis_cache "redis://127.0.0.1:6379"
          bench set-config -g redis_queue "redis://127.0.0.1:6379"
          bench set-config -g redis_socketio "redis://127.0.0.1:6379"
          bench new-site test_site \
            --db-root-username root \
            --mariadb-root-password root \
            --admin-password admin \
            --no-mariadb-socket \
            --install-app erpnext \
            --install-app payments \
            --install-app erpnext_enhancements \
            --set-default

      - name: Run app test suite
        working-directory: frappe-bench
        run: bench --site test_site run-tests --app erpnext_enhancements
